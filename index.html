<!doctype html>
<html lang="es">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet">
    <script src="sqlite3.js"></script>
    <script src="main.js"></script>


  </head>

  <body>
    <!-- en el header me falta border bottom -->
    <header class="py-3 px-6 bg-white border-bborder-[var(--border-color)]">
      <div class="flex items-center gap-2.5">
        <svg width="25" height="25" viewBox="0 0 25 25" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M6.25 18.375H8.75V6.25H6.25V18.375ZM15.875 15.875H18.375V6.25H15.875V15.875ZM11.0625 12.125H13.5625V6.25H11.0625V12.125ZM3.9375 24.625C2.83333 24.625 1.90104 24.2448 1.14062 23.4844C0.380208 22.724 0 21.7917 0 20.6875V3.9375C0 2.83333 0.380208 1.90104 1.14062 1.14062C1.90104 0.380208 2.83333 0 3.9375 0H20.6875C21.7917 0 22.724 0.380208 23.4844 1.14062C24.2448 1.90104 24.625 2.83333 24.625 3.9375V20.6875C24.625 21.7917 24.2448 22.724 23.4844 23.4844C22.724 24.2448 21.7917 24.625 20.6875 24.625H3.9375ZM3.9375 20.6875H20.6875V3.9375H3.9375V20.6875ZM3.9375 3.9375V20.6875V3.9375Z"
            fill="#2B6CEE" />
        </svg>
        <h1 class="text-xl font-bold text-black">Kanban 2026</h1>
      </div>
    </header>

    <main>
      <div class="py-4 px-6s flex items-center justify-between">
        <h2>Product Roadmap</h2>
        <div class="flex items-center gap-3">
          <div class="relative">
            <svg class="absolute left-10 top-1/2 transform -translate-y-1/2 opacity-50" width="14" height="14"
              viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M12.45 13.5L7.725 8.775C7.35 9.075 6.91875 9.3125 6.43125 9.4875C5.94375 9.6625 5.425 9.75 4.875 9.75C3.5125 9.75 2.35938 9.27813 1.41562 8.33438C0.471875 7.39063 0 6.2375 0 4.875C0 3.5125 0.471875 2.35938 1.41562 1.41562C2.35938 0.471875 3.5125 0 4.875 0C6.2375 0 7.39063 0.471875 8.33438 1.41562C9.27813 2.35938 9.75 3.5125 9.75 4.875C9.75 5.425 9.6625 5.94375 9.4875 6.43125C9.3125 6.91875 9.075 7.35 8.775 7.725L13.5 12.45L12.45 13.5ZM4.875 8.25C5.8125 8.25 6.60938 7.92188 7.26562 7.26562C7.92188 6.60938 8.25 5.8125 8.25 4.875C8.25 3.9375 7.92188 3.14062 7.26562 2.48438C6.60938 1.82812 5.8125 1.5 4.875 1.5C3.9375 1.5 3.14062 1.82812 2.48438 2.48438C1.82812 3.14062 1.5 3.9375 1.5 4.875C1.5 5.8125 1.82812 6.60938 2.48438 7.26562C3.14062 7.92188 3.9375 8.25 4.875 8.25Z"
                fill="#94A3B8" />
            </svg>
            <input class="py-2.5 px-9 rounded-md text-sm w-80" type="text" id="searchInput" placeholder="Search...">
          </div>
          <!-- FILTROS -->
          <div id="columnFilter" class="relative flex items-center bg-white rounded-md py-1.5 px-3">
            <button class="flex items-center bg-none border-none gap-2 font-semibold text-xs cursor-pointer" id="filter"
              onclick="toggleMenu();"><svg width="12" height="8" viewBox="0 0 12 8" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M4.66667 8V6.66667H7.33333V8H4.66667ZM2 4.66667V3.33333H10V4.66667H2ZM0 1.33333V0H12V1.33333H0Z"
                  fill="#0F172A" />
              </svg>Filters</button>
            <!-- tasks -->
            <div class="absolute right-0 display-none top-11 p-2.5 bg-white rounded-md shadow-lg gap-2 flex-col z-100">
              <button class="bg-[hsl(239,84%,67%)]" id="btn-design" onclick="filtrarPorTipo('DESIGN')">DESIGN</button>
              <button class="bg-red-500" id="btn-bug" onclick="filtrarPorTipo('BUG')">BUG</button>
              <button class="bg-blue-500" id="btn-urgent" onclick="filtrarPorTipo('URGENT')">URGENT</button>
              <button onclick="filtrarPorTipo('ALL')">ALL</button>
            </div>
          </div>
          <button class="text-white border-none py-2 px-4 rounded-md cursor-pointer font-semibold text-xs"
            id="addColumn">+ New Column</button>
        </div>
      </div>

      <div class="flex items-start gap-4 p-5 overflow-auto" id="board">
      </div>

      <template id="template-columna">
        <!-- columna -->
        <div class="flex flex-col rounded-lg p-3 w-75 max-h-[85vh]">
          <!-- columna-header -->
          <div class="flex items-center justify-center gap-2 mb-3 ">
            <!-- titulo-columna creo q no lo uso MIRAR -->
            <input type="text" class="titulo-columna"
            placeholder="Escribe el título...">
            <span class="contador-tareas">0</span>
            <button class="btn-tres-puntos">•••</button>
            <div class="menu-opciones">
              <button class="btnEditar btn-accion">✎ Editar</button>
              <button class="btnEliminar btn-accion">✕ Eliminar</button>
            </div>
          </div>
          <div class="contenedor-tareas"></div>
          <button class="add-card-btn">+ Add Card</button>
        </div>
      </template>

      <template id="template-tarea">
        <div class="tarea">
          <div class="tarea-top">
            <div class="etiquetas"></div>
            <input type="text" placeholder="Escribe la tarea...">
            <select class="tipo-tarea">
              <option value="DESIGN">DESIGN</option>
              <option value="BUG">BUG</option>
              <option value="URGENT">URGENT</option>
            </select>
            <button class="btn-tres-puntos">•••</button>
            <div class="menu-opciones">
              <button class="btnEditar btn-accion">✎ Editar</button>
              <button class="btnEliminar btn-accion">✕ Eliminar</button>
            </div>
          </div>
          <div class="tarea-meta">
            <img src="User.png" alt="creador" id="foto">
            <span class="fecha"></span>
          </div>
        </div>
      </template>
    </main>
    </div>

  </body>

</html>
